<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Research Outcome Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-card animate-fade-in">
            <span>Research Hub</span>
            <h2> Login</h2>
            <p>Welcome back!🫡Enter your details to continue➡️.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="auth-footer" style="margin-top: 2rem; text-align: center;">
                <p style="color: var(--text-muted); font-size: 0.9rem;">
                    New researcher? <a href="register.html"
                        style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign Up</a>
                </p>
            </div>
            <div style="margin-top: 1.5rem; text-align: center;">
                <a href="dashboard.html"
                    style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; opacity: 0.6; transition: opacity 0.3s;"
                    onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">Enter Guest Mode (Demo)</a>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
