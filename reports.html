<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Research Outcome Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass">
            <div class="sidebar-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                </svg>
                <span>Research Hub</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="9" x="3" y="3" rx="1" />
                        <rect width="7" height="5" x="14" y="3" rx="1" />
                        <rect width="7" height="9" x="14" y="12" rx="1" />
                        <rect width="7" height="5" x="3" y="16" rx="1" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="addResearch.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="M12 5v14" />
                    </svg>
                    <span>Add Research</span>
                </a>
                <a href="reports.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <line x1="10" y1="9" x2="8" y2="9" />
                    </svg>
                    <span>Reports</span>
                </a>

            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header animate-fade-in">
                <div class="page-title">
                    <p
                        style="color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.75rem; margin-bottom: 0.5rem;">
                        Analytics</p>
                    <h2>Reports</h2>
                    <p style="color: var(--text-muted);">A clear overview of all your research projects.</p>
                </div>
                <div class="page-actions" style="display: flex; gap: 1rem;">
                    <button id="export-csv-btn" class="btn"
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;">Export
                        CSV</button>
                    <button id="download-pdf-btn" class="btn">Download PDF</button>
                </div>
            </header>

            <div class="stat-grid animate-fade-in" style="animation-delay: 0.1s;">
                <div class="stat-card glass-card">
                    <h3>Total Research</h3>
                    <div class="value" id="total-research">0</div>
                </div>
                <div class="stat-card glass-card">
                    <h3 style="color: var(--primary);">Ongoing</h3>
                    <div class="value" id="ongoing-count">0</div>
                </div>
                <div class="stat-card glass-card">
                    <h3 style="color: var(--success);">Completed</h3>
                    <div class="value" id="completed-count">0</div>
                </div>
                <div class="stat-card glass-card">
                    <h3 style="color: var(--warning);">Published</h3>
                    <div class="value" id="published-count">0</div>
                </div>
            </div>

            <div class="data-card glass-card animate-fade-in" style="animation-delay: 0.2s;">
                <div class="card-header">
                    <h3 style="font-weight: 700;">Research History</h3>
                    <span class="badge status-ongoing">Real-time</span>
                </div>
                <div class="table-container">
                    <table id="reports-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Description</th>
                                <th>Start Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
