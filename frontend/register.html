<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Research Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-card animate-fade-in">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join our research community today.</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-name">Full Name</label>
                    <input type="text" id="register-name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email Address</label>
                    <input type="email" id="register-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">Confirm Password</label>
                    <input type="password" id="register-confirm-password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn" id="register-btn">Register</button>
            </form>
            <div class="auth-footer" style="margin-top: 2rem; text-align: center;">
                <p style="color: var(--text-muted); font-size: 0.9rem;">
                    Already a member? <a href="index.html"
                        style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a>
                </p>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
